<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Availability Dashboard</title>
    <link rel="icon" href="https://assetscontent.s3.ca-central-1.amazonaws.com/images/1596805420017-Croix-Rouge-canadienne_LogoPNG_fond-pale_1.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Open Sans', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
            background: linear-gradient(135deg, #e0f2f7, #c1e4ed, #e0f2f7); 
            background-size: 200% 200%;
            animation: gradientAnimation 20s ease infinite alternate;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background-color: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .header-section {
            background-color: #e4002b;
            color: #fff;
            padding: 25px;
            text-align: center;
            border-radius: 10px 10px 0 0;
            margin: -35px -35px 35px -35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-section .logo {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .header-section h1 {
            margin: 0;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .dashboard-controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .fetch-button {
            padding: 12px 25px;
            background-color: #007bff; /* Blue for action button */
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 3px 8px rgba(0, 123, 255, 0.3);
        }

        .fetch-button:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        .loading-message {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            color: #007bff;
            display: none; /* Hidden by default */
        }

        .error-message {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            color: #d32f2f;
            background-color: #ffebee;
            border-radius: 6px;
            margin-top: 20px;
            display: none; /* Hidden by default */
        }

        .dashboard-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f8f8;
            border-radius: 8px;
            box-shadow: inset 0 1px 5px rgba(0,0,0,0.05);
        }

        .summary-card {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .summary-card h3 {
            color: #e4002b;
            margin-top: 0;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .summary-card p {
            font-size: 2em;
            font-weight: 700;
            color: #007bff;
            margin: 0;
        }

        .data-table-container {
            margin-top: 30px;
            overflow-x: auto; /* Allows horizontal scrolling for large tables */
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        #dataTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        #dataTable th, #dataTable td {
            border: 1px solid #f0f0f0;
            padding: 12px 15px;
            text-align: left;
        }

        #dataTable th {
            background-color: #e4002b; /* Red Cross Red for headers */
            color: #fff;
            font-weight: 600;
            white-space: nowrap; /* Prevent headers from wrapping too much */
        }

        #dataTable tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        #dataTable tr:hover {
            background-color: #e9f7fe; /* Light blue on hover */
        }

        #dataTable td:empty:before { /* Display something for empty cells */
            content: "N/A";
            color: #aaa;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.9em;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px 15px;
                padding: 25px;
            }
            .header-section h1 {
                font-size: 1.6em;
            }
            .header-section .logo {
                height: 40px;
            }
            .dashboard-controls {
                margin-bottom: 20px;
            }
            .dashboard-summary {
                grid-template-columns: 1fr;
            }
            #dataTable th, #dataTable td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <img src="https://assetscontent.s3.ca-central-1.amazonaws.com/images/1596805420017-Croix-Rouge-canadienne_LogoPNG_fond-pale_1.png" alt="Canadian Red Cross Logo" class="logo">
            <h1>Deployment Availability Dashboard</h1>
        </header>

        <div class="dashboard-controls">
            <button class="fetch-button" id="fetchDataButton">Load Dashboard Data</button>
            <div class="loading-message" id="loadingMessage">Loading data...</div>
            <div class="error-message" id="errorMessage">An error occurred while fetching data. Please try again.</div>
        </div>

        <div class="dashboard-summary" id="dashboardSummary">
            <div class="summary-card">
                <h3>Total Submissions</h3>
                <p id="totalSubmissions">0</p>
            </div>
            <div class="summary-card">
                <h3>Interested in Wildfire</h3>
                <p id="wildfireInterest">0</p>
            </div>
            <div class="summary-card">
                <h3>Available for Short Notice</h3>
                <p id="shortNoticeAvailable">0</p>
            </div>
        </div>

        <div class="data-table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <!-- Table headers will be generated here -->
                    </tr>
                </thead>
                <tbody>
                    <!-- Table data will be loaded here -->
                </tbody>
            </table>
        </div>

        <footer class="footer">
            Data last updated: <span id="lastUpdated">N/A</span> &copy; 2026 Canadian Red Cross.
        </footer>

    </div>

    <script>
        // !! IMPORTANT: Replace this with the HTTP POST URL from your Power Automate "Read Data" flow !!
        const POWER_AUTOMATE_READ_API_URL = "https://e5136d884e72452fa7e253f2f1e5ae.7b.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/f211342d00e74a398ea78b94f534742a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=d_UWXiYkKByCLFOeZJ_QRnAnF9JbuHS9WYOLmPa6ByU";

        const fetchDataButton = document.getElementById('fetchDataButton');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');
        const dataTableBody = document.querySelector('#dataTable tbody');
        const dataTableHeader = document.querySelector('#dataTable thead tr');
        const totalSubmissionsElement = document.getElementById('totalSubmissions');
        const wildfireInterestElement = document.getElementById('wildfireInterest');
        const shortNoticeAvailableElement = document.getElementById('shortNoticeAvailable');
        const lastUpdatedElement = document.getElementById('lastUpdated');

        async function fetchDataAndDisplay() {
            fetchDataButton.disabled = true;
            loadingMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            dataTableBody.innerHTML = ''; // Clear previous data
            dataTableHeader.innerHTML = ''; // Clear previous headers
            totalSubmissionsElement.textContent = '...';
            wildfireInterestElement.textContent = '...';
            shortNoticeAvailableElement.textContent = '...';

            try {
                const response = await fetch(POWER_AUTOMATE_READ_API_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                console.log("Fetched Data:", data); // Debugging

                if (data && data.length > 0) {
                    // --- Process and Display Data in Table ---
                    const headers = Object.keys(data[0]);
                    dataTableHeader.innerHTML = headers.map(header => `<th>${header}</th>`).join('');

                    dataTableBody.innerHTML = data.map(row => {
                        return `<tr>${headers.map(header => `<td>${row[header] || ''}</td>`).join('')}</tr>`;
                    }).join('');

                    // --- Perform Basic Analysis ---
                    const totalSubmissions = data.length;
                    const wildfireInterest = data.filter(row => row['Interested 2026?'] === 'Yes').length;
                    const shortNoticeAvailable = data.filter(row => row['Short Notice?'] === 'Yes').length;

                    totalSubmissionsElement.textContent = totalSubmissions;
                    wildfireInterestElement.textContent = wildfireInterest;
                    shortNoticeAvailableElement.textContent = shortNoticeAvailable;
                    lastUpdatedElement.textContent = new Date().toLocaleString();

                } else {
                    dataTableBody.innerHTML = '<tr><td colspan="99" style="text-align:center;">No data available.</td></tr>';
                    totalSubmissionsElement.textContent = '0';
                    wildfireInterestElement.textContent = '0';
                    shortNoticeAvailableElement.textContent = '0';
                }

            } catch (error) {
                console.error("Error fetching data:", error);
                errorMessage.textContent = `Failed to load data: ${error.message}. Please ensure the Power Automate flow is running and accessible.`;
                errorMessage.style.display = 'block';
                dataTableBody.innerHTML = '<tr><td colspan="99" style="text-align:center; color: red;">Error loading data.</td></tr>';
                totalSubmissionsElement.textContent = 'N/A';
                wildfireInterestElement.textContent = 'N/A';
                shortNoticeAvailableElement.textContent = 'N/A';
            } finally {
                loadingMessage.style.display = 'none';
                fetchDataButton.disabled = false;
            }
        }

        // Load data automatically when the page loads
        document.addEventListener('DOMContentLoaded', fetchDataAndDisplay);
        fetchDataButton.addEventListener('click', fetchDataAndDisplay);
    </script>
</body>
</html>
